<!DOCTYPE html>
<html>
<head>
    <title>Arena Serpentarius</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h1>🐍 Arena Serpentarius</h1>

<p id="points">Points: 0</p>
<p id="energy">Energy: 0</p>
<p id="xp">XP: 0</p>
<p id="level">Level: 0</p>

<div id="plusOne" style="
    position: absolute;
    font-size: 30px;
    color: green;
    display: none;
    font-weight: bold;
">
+1
</div>

<button onclick="tap()">TAP</button>

<script>
let tg = window.Telegram?.WebApp;

tg?.expand();

let telegram_id = tg?.initDataUnsafe?.user?.id;

function showPlusOne() {
    const el = document.getElementById("plusOne");

    el.style.display = "block";
    el.style.opacity = "1";
    el.style.transform = "translateY(0px)";

    setTimeout(() => {
        el.style.transition = "all 0.5s";
        el.style.opacity = "0";
        el.style.transform = "translateY(-20px)";
    }, 50);

    setTimeout(() => {
        el.style.display = "none";
    }, 600);
}

alert("Telegram ID: " + telegram_id);

async function tap() {
    if (!telegram_id) {
        alert("Open this inside Telegram Mini App");
        return;
    }

    showPlusOne();

    let res = await fetch(`/tap?telegram_id=${telegram_id}`, {
        method: "POST"
    });

    let data = await res.json();

    alert(JSON.stringify(data));

    document.getElementById("points").innerText = "Points: " + data.points;
    document.getElementById("energy").innerText = "Energy: " + data.energy;
    document.getElementById("xp").innerText = "XP: " + data.xp;
    document.getElementById("level").innerText = "Level: " + data.level;
}
</script>

</body>
</html>
